name: 澳门每日同步与预测

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  update-predict:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码仓库
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 缓存 SQLite 数据库
        uses: actions/cache@v3
        with:
          path: macau_simple.db
          key: macau-simple-db
          restore-keys: |
            macau-simple-db

      - name: 同步数据并生成预测
        run: python macau_simple.py sync

      - name: 显示预测推荐
        run: python macau_simple.py show

      - name: 上传预测报告
        uses: actions/upload-artifact@v4
        with:
          name: 澳门预测报告
          path: macau_simple.db
        if: always()
