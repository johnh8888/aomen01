name: 新澳门彩每日预测

on:
  schedule:
    # 每天北京时间 08:00 运行（UTC 00:00）
    - cron: '0 0 * * *'
  workflow_dispatch:   # 允许手动触发

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖（无额外依赖，标准库即可）
        run: |
          python -m pip install --upgrade pip

      - name: 配置 PushPlus Token（注入脚本）
        run: |
          # 将脚本中的 PUSHPLUS_TOKEN 占位符替换为 GitHub Secrets 中的真实 Token
          sed -i "s/PUSHPLUS_TOKEN = \"\"/PUSHPLUS_TOKEN = \"${{ secrets.PUSHPLUS_TOKEN }}\"/" newmacau_marksix.py

      - name: 初始化/同步数据并生成预测
        run: |
          # 如果数据库不存在，则执行 bootstrap；否则执行 sync
          if [ ! -f "newmacau_marksix.db" ]; then
            python newmacau_marksix.py bootstrap
          else
            python newmacau_marksix.py sync --with-backtest
          fi

      - name: 显示最终推荐并推送微信
        run: |
          python newmacau_marksix.py show

      - name: 上传数据库（可选，用于备份）
        uses: actions/upload-artifact@v4
        with:
          name: newmacau-database
          path: newmacau_marksix.db
          retention-days: 7
